name: CI - Model Retraining

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # bisa dijalankan manual juga

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: |
          pip install mlflow==2.19.0 scikit-learn xgboost pandas numpy

      - name: 🚀 Run MLflow project
        run: |
          cd MLPROJECT
          mlflow run . -P data_path=dataset/Company_Bankruptcy_Prediction_data.csv

      - name: 📤 Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/mlruns
