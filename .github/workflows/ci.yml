name: CI - Model Training

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # bisa dijalankan manual dari GitHub

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Ambil kode dari repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Siapkan Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Membangun_Model/requirements.txt

      # 4️⃣ Jalankan script training model
      - name: Run model training
        run: |
          python Membangun_Model/modelling_tuning.py

      # 5️⃣ Upload hasil MLflow logs ke artifact
      - name: Upload MLflow logs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/

      # 6️⃣ Upload model hasil training ke artifact
      - name: Upload trained model
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: model/
